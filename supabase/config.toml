# Configuration des Edge Functions.
# stripe-webhook doit être joignable par Stripe sans JWT Supabase :
# la sécurité est assurée par la vérification de signature Stripe.
[functions.stripe-webhook]
verify_jwt = false

# brevo-webhook : appelé par Brevo (events email) sans JWT ; sécurité = jeton ?token=.
[functions.brevo-webhook]
verify_jwt = false

# Fonctions appelées par cron (l'en-tête Authorization est fourni dans l'appel cron).
[functions.send-emails]
verify_jwt = true

[functions.update-benchmarks]
verify_jwt = true

[functions.orchestrator]
verify_jwt = true
